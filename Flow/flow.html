<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Readify</title>
        <link rel="icon" type="image/png" href="../image/book.png" height="150px" width="150px">
        <link rel="stylesheet" href="style.css">
        <link rel="manifest" href="../manifest.json">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Quicksand:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Playfair+Display:wght@600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
       
    </head>

    <body>
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html"><img src="../image/logo2.png" alt="Website Logo" height="100px" width="100px" ></a>
            </div>

            <div>
                <!-- Navigation Links in Button Formate -->
                <ul class="nav-links">
                    <li><a href="../index.html" >Home</a></li>
                    <li><a href="../Explorer/explorer.html" >Explorer</a></li>
                    <li><a href="../Tracker/tracker.html" >Tracker</a></li>
                    <li><a href="../Recommender/recommender.html" >Random</a></li>
                    <li><a href="flow.html" >Flow</a></li>
                    <li><a href="../Feedback/feedback.html" >Feedback</a></li>
                </ul>
            </div>

            <!-- Right Side Content Sign-In, Donate Buttons and Search Box -->
            <div class="right-side">
                <div class="button">
                    <a href="#" class="login-button">Sign-In</a>
                    <a href="#" class="donate-button">Donate</a>
                </div>

                <div class="search-item">
                    <input type="search" placeholder=" Search" class="search-box">
                    <a href="#"><i class="fa fa-search search-icon"></i></a>
                </div>
                
                
            </div>

            <!-- hamburger for mobile  -->
            <div class="hamburger" id="hamburger">
                <i class="fa fa-bars"></i>
            </div>
        </nav>

       <!-- Main Flow Section -->
        <header>
            <h1>Reading Flow Section</h1>
            <p>Relax, Focus, and Enjoy Your Reading Time</p>
        </header>

        <main class="flow-container">
            <section class="sounds">
                <h2>Cozy Sounds</h2>

                <!-- Icons -->
                <button type="button" onclick="playSound('rain')"><i class="fa fa-cloud fa-3x"></i>Rain</button>
                <button type="button" onclick="playSound('calm')"><i class="fa fa-leaf fa-3x"></i>Calm</button>
                <button type="button" onclick="playSound('classic')"><i class="fa fa-music fa-3x"></i>Classic</button>
                <button type="button" onclick="playSound('terror')"><i class="fa fa-fire fa-3x"></i>Terror</button>
                <button type="button" onclick="playSound('love')"><i class="fa fa-heart fa-3x"></i>Love</button>
                <button type="button" onclick="playSound('thunder')"><i class="fa fa-bolt fa-3x"></i>Thunder</button>
                <button type="button" onclick="stopSound()"><i class="fa fa-times fa-3x"></i>Stop</button>

                <!-- sounds -->
                <audio id="rain" src="../Flow/Sounds/rain.mp3"></audio>
                <audio id="calm" src="../Flow/Sounds/calm.mp3"></audio>
                <audio id="classic" src="../Flow/Sounds/classic.mp3"></audio>
                <audio id="terror" src="../Flow/Sounds/terror.mp3"></audio>
                <audio id="love" src="../Flow/Sounds/love.mp3"></audio>
                <audio id="thunder" src="../Flow/Sounds/thunder.mp3"></audio>
            </section>

            <!-- Book Section -->
             <section class="search">
                <h2>Books are completed</h2>
                <input type="text" id="titleSearch" placeholder="Enter The Book Name">
                <button onclick="addBook()">Add Book</button>

                <ul id="bookList"></ul>
             </section>
        </main>

        <!-- footer section -->
         <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-left">
                    <img src="../image/logo2.png" alt="Readify Logo" class="footer-logo">
                    <div class="footer-brand">Readify</div>
                </div>

                <div class="footer-right">
                    <div class="footer-toptext">Created And Managed By Readify @ 2026</div>
                    <form class="footer-search" id="newsletterForm">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter Your Email">
                        <button type="button" onclick="saveEmail()">Submit</button>
                        <p id="message"></p>
                    </form>

                    <nav class="footer-links">
                        <a href="../index.html">Home</a>
                        <a href="../Explorer/explorer.html">Explorer</a>
                        <a href="../Tracker/tracker.html">Tracker</a>
                        <a href="../Recommender/recommender.html">Recommend</a>
                        <a href="flow.html">Flow</a>
                        <a href="../Feedback/feedback.html">Feedback</a>
                    </nav>
                </div>
            </div>
         </footer>
        
        
        


      

         

        <script src="script.js" defer></script>
        <script src="../signin.js" defer></script>
    </body>
</html>
