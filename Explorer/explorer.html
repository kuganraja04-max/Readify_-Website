<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Readify</title>
        <link rel="manifest" href="../manifest.json">
        <link rel="icon" type="image/png" href="../image/book.png">
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Fraunces:opsz,wght@9..144,600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Playfair+Display:wght@600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
       
    </head>

    <body class="explorer-page">
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html"><img src="../image/logo2.png" alt="Website Logo" height="100px" width="100px" ></a>
            </div>

            <div>
                <!-- Navigation Links in Button Formate -->
                <ul class="nav-links">
                    <li><a href="../index.html" >Home</a></li>
                    <li><a href="explorer.html" >Explorer</a></li>
                    <li><a href="../Tracker/tracker.html" >Tracker</a></li>
                    <li><a href="../Recommender/recommender.html" >Random</a></li>
                    <li><a href="../Flow/flow.html" >Flow</a></li>
                    <li><a href="../Feedback/feedback.html" >Feedback</a></li>
                </ul>
            </div>

            <!-- Right Side Content Sign-In, Donate Buttons and Search Box -->
            <div class="right-side">
                <div class="button">
                    <a href="#" class="login-button">Sign-In</a>
                    <a href="#" class="donate-button">Donate</a>
                </div>

                <div class="search-item">
                    <input type="search" placeholder=" Search" class="search-box">
                    <a href="#"><i class="fa fa-search search-icon"></i></a>
                </div>
                
            </div>

            <!-- hamburger for mobile  -->
            <div class="hamburger" id="hamburger">
                <i class="fa fa-bars"></i>
            </div>
        </nav>

        <!-- Main Section -->
        <!-- Search section -->
        <main class="search-section">
            <div class="search-row">
                <input type="text" id="titleSearch" placeholder="Enter The Book Name">
                <input type="text" id="authorSearch" placeholder="Enter The Author Name">
                <button type="reset" id="resetBtn">Reset</button>
                
            </div>

            <!--genre section  -->
            <div class="genre-buttons" id="genreButtons"></div>

            <!-- book card  -->
            <section id="bookContainer" class="book-container"></section>


            <!-- modal -->

            <div id="bookModal" class="modal">
                <div class="modal-content">
                    <span id="closeModal">&times;</span>

                    <h2 id="modalTitle"></h2>
                    <p id="modalSynopsis"></p>

                    <h3>Prequels/ Sequels</h3>
                    <ul id="modalSeries"></ul>

                    <h3>Rating & Reviews</h3>
                    <table>
                        <thead>
                            <tr>
                                <th>User</th>
                                <th>Ratings</th>
                                <th>Comment</th>
                            </tr>
                        </thead>
                        <tbody id="modalRatings"></tbody>
                    </table>
                </div>
            </div>
        </main>
     


        <!-- footer section -->
         <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-left">
                    <img src="../image/logo2.png" alt="Readify Logo" class="footer-logo">
                    <div class="footer-brand">Readify</div>
                </div>

                <div class="footer-right">
                    <div class="footer-toptext">Created And Managed By Readify @ 2026</div>
                    <form class="footer-search" id="newsletterForm">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter Your Email">
                        <button type="button" onclick="saveEmail()">Submit</button>
                        <p id="message"></p>
                    </form>

                   <nav class="footer-links">
                        <a href="../index.html">Home</a>
                        <a href="explorer.html">Explorer</a>
                        <a href="../Tracker/tracker.html">Tracker</a>
                        <a href="../Recommender/recommender.html">Recommend</a>
                        <a href="../Flow/flow.html">Flow</a>
                        <a href="../Feedback/feedback.html">Feedback</a>
                    </nav>
                </div>
            </div>
         </footer>
        
        
        


      

         

        <script src="script.js" defer></script>
        <script src="../signin.js" defer></script>
    </body>
</html>
