<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Readify</title>
        <link rel="icon" type="image/png" href="image/book.png">
        <link rel="stylesheet" href="style.css">
        <link rel="manifest" href="manifest.json">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Playfair+Display:wght@600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
       
    </head>

    <body>
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="logo">
                <a href="index.html"><img src="image/logo2.png" alt="Website Logo" height="100px" width="100px" loading="lazy" decoding="async" ></a>
            </div>

            <div>
                <!-- Navigation Links in Button Formate -->
                <ul class="nav-links">
                    <li><a href="index.html" >Home</a></li>
                    <li><a href="Explorer/explorer.html" >Explorer</a></li>
                    <li><a href="Tracker/tracker.html" >Tracker</a></li>
                    <li><a href="Recommender/recommender.html" >Random</a></li>
                    <li><a href="Flow/flow.html" >Flow</a></li>
                    <li><a href="Feedback/feedback.html" >Feedback</a></li>
                </ul>
            </div>

            <!-- Right Side Content Sign-In, Donate Buttons and Search Box -->
            <div class="right-side">
                <div class="button">
                    <a href="#" id="openSignIn" class="login-button">Sign-In</a>
                    <a href="#" class="donate-button">Donate</a>
                </div>

                <div class="search-item">
                    <label for="search">
                        <input type="search" id="search" placeholder=" Search" class="search-box">
                    </label>
                    <i class="fa fa-search search-icon"></i>
                </div>
            </div>

            <!-- hamburger for mobile  -->
            <div class="hamburger" id="hamburger">
                <i class="fa fa-bars"></i>
            </div>
        </nav>

        <!-- Sign in pop up -->
        <div id="signInModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" id="closeSignIn">&times;</span>
                <h2>Welcome To Readify Website</h2>

                <form id="signInForm">
                    <label for="signinEmail">Email</label>
                    <input type="email" id="signinEmail" placeholder="Enter Your Email" required>

                    <label for="signinPassword">Password</label>
                    <input type="password" id="signinPassword" placeholder="Enter Your Password" required>

                    <button type="submit" class="login-btn">Sign In</button>
                </form>
            </div>
        </div>

        <!-- hero section -->
        <section class="hero">
            <div class="hero-left">
                <h1 id="quote-text">Loading quote....</h1>
                <p id="quote-author"></p>
                <a href="Explorer/explorer.html">Explore Books</a>
            </div>

            <div class="hero-right" id="hero-image"></div>
          
        </section>
        <!-- AUTHOR OF THE DAY -->
        <section class="author-section">
            <h2>Author of the Day</h2>

            <div class="author-card">
                <img id="authorImg" src="image/author-image1.jpg" alt="Author Of The Day">
                <div>
                    <h3 id="authorName"></h3>
                    <p id="authorDesc"></p>
                </div>
            </div>
        </section>

        <!-- footer section -->
         <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-left">
                    <img src="image/logo2.png" alt="Readify Logo" class="footer-logo">
                    <div class="footer-brand">Readify</div>
                </div>

                <div class="footer-right">
                    <div class="footer-toptext">Created And Managed By Readify @ 2026</div>
                    <form class="footer-search" >
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter Your Email">
                        <button type="button" onclick="saveEmail()">Submit</button>
                        <p id="message"></p>
                    </form>

                    <nav class="footer-links">
                        <a href="index.html">Home</a>
                        <a href="Explorer/explorer.html">Explorer</a>
                        <a href="Tracker/tracker.html">Tracker</a>
                        <a href="Recommender/recommender.html">Recommend</a>
                        <a href="Flow/flow.html">Flow</a>
                        <a href="Feedback/feedback.html">Feedback</a>
                    </nav>
                </div>
            </div>
         </footer>

        <script>
            if ("serviceWorker" in navigator) {
                window.addEventListener("load", () => {
                    navigator.serviceWorker.register("./sw.js");
                 });
            }
            </script>



        

        
        


      

         

        <script src="script.js" defer></script>
        <script src="signin.js" defer></script>
    </body>
</html>
