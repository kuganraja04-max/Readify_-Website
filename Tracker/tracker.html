<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Readify</title>
        <link rel="icon" type="image/png" href="../image/book.png" height="150px" width="150px" loading="lazy" decoding="async">
        <link rel="stylesheet" href="style.css">
        <link rel="manifest" href="../manifest.json">
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600&family=Playfair+Display:wght@600;700&family=Merriweather:wght@400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Oswald:wght@500;600;700&family=Nunito:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
       
    </head>

    <body>
        <!-- Navigation Bar -->
        <nav class="navbar">
            <div class="logo">
                <a href="../index.html"><img src="../image/logo2.png" alt="Website Logo" height="100px" width="100px" loading="lazy" decoding="async"></a>
            </div>

            <div>
                <!-- Navigation Links in Button Formate -->
                <ul class="nav-links">
                    <li><a href="../index.html" >Home</a></li>
                    <li><a href="../Explorer/explorer.html" >Explorer</a></li>
                    <li><a href="tracker.html" >Tracker</a></li>
                    <li><a href="../Recommender/recommender.html" >Random</a></li>
                    <li><a href="../Flow/flow.html" >Flow</a></li>
                    <li><a href="../Feedback/feedback.html" >Feedback</a></li>
                </ul>
            </div>

            <!-- Right Side Content Sign-In, Donate Buttons and Search Box -->
            <div class="right-side">
                <div class="button">
                    <a href="#" class="login-button">Sign-In</a>
                    <a href="#" class="donate-button">Donate</a>
                </div>

                <div class="search-item">
                    <input type="search" placeholder=" Search" class="search-box">
                    <a href="#"><i class="fa fa-search search-icon"></i></a>
                </div>

                
                
                
            </div>

            <!-- hamburger for mobile  -->
            <div class="hamburger" id="hamburger">
                <i class="fa fa-bars"></i>
            </div>
        </nav>

        <!-- Tracker Section -->
         <main>
            <h2>Reading Progress Tracker</h2>

            
            


            <!-- Data Input Section -->

            <label for="totalPages">Total Pages: </label><br>
            <input type="number" id="totalPages"><br>

            <lable for="pagesRead">How Many Pages Read: </lable><br>
            <input type="number" id="pagesRead"><br>

            <label for="speed">How Many Pages Read By A Day: </label><br>
            <input type="number" id="speed"><br>


            <!-- Button Section -->
             <button type="button" class="book-button" onclick="calculate()">Calculate</button>
             <button type="button" class="book-button" onclick="saveData()">Save</button>
             <button type="button" class="book-button" onclick="resetInputs()">Reset</button>


             <!-- Output -->
             <h3 id="result"></h3> 

             <!-- Progress Bar -->
             <div class="progress-wrap">
                <div class="progreess-head">
                    <span>Progress</span>
                    <span id="progressText">0%</span>
                </div>

                <div class="progress-box">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <p class="progress-note">Save Your Progress to Continue Later.</p>
             </div>

         </main>

        


        <!-- footer section -->
         <footer class="site-footer">
            <div class="footer-inner">
                <div class="footer-left">
                    <img src="../image/logo2.png" alt="Readify Logo" class="footer-logo">
                    <div class="footer-brand">Readify</div>
                </div>

                <div class="footer-right">
                    <div class="footer-toptext">Created And Managed By Readify @ 2026</div>
                    <form class="footer-search" id="newsletterForm">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Enter Your Email">
                        <button type="button" onclick="saveEmail()">Submit</button>
                        <p id="message"></p>
                    </form>

                    <nav class="footer-links">
                        <a href="../index.html">Home</a>
                        <a href="../Explorer/explorer.html">Explorer</a>
                        <a href="tracker.html">Tracker</a>
                        <a href="../Recommender/recommender.html">Recommend</a>
                        <a href="../Flow/flow.html">Flow</a>
                        <a href="../Feedback/feedback.html">Feedback</a>
                    </nav>
                </div>
            </div>
         </footer>
        
        
        


      

         

        <script src="script.js" defer></script>
        <script src="../signin.js" defer></script>
    </body>
</html>
